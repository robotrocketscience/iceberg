name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"
          enable-cache: true
      - name: Sync environment
        working-directory: water-prop
        run: uv sync
      - name: Run physics-model tests
        working-directory: water-prop
        run: uv run pytest tests/
