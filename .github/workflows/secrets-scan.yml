name: secrets-scan

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  pull-requests: read   # gitleaks-action lists PR commits on pull_request events

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0        # scan full history, not just the diff
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Private PII patterns live in an org secret (same mechanism as the
  # aelfrice staging gate). The job no-ops cleanly when the secret is absent
  # (e.g. forks, dependabot) so it never blocks outside contributors.
  pii-pattern-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Scan history against private pattern list
        env:
          SCAN_RULES_B64: ${{ secrets.PII_PATTERNS_SECRET }}
        run: |
          if [ -z "$SCAN_RULES_B64" ]; then
            echo "no pattern secret available - skipping (fork/dependabot context)"
            exit 0
          fi
          echo "$SCAN_RULES_B64" | base64 -d > /tmp/patterns.txt
          fail=0
          while IFS= read -r pat; do
            case "$pat" in ''|'#'*) continue;; esac  # skip blanks + comments: '#' as a regex matches everything
            if git rev-list --all | while read -r c; do git grep -l -iE "$pat" "$c" -- 2>/dev/null; done | grep -q .; then
              echo "::error::PII pattern matched in history (pattern list is private)"
              fail=1
            fi
          done < /tmp/patterns.txt
          exit $fail
